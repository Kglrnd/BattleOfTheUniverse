spring:
  datasource:
    url: jdbc:h2:file:./data/battleoftheuniverse;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

server:
  servlet:
    session:
      # DevTools turns this on for its hot-restart ("keep me logged in across a restart")
      # feature, but any change to a session-stored class's shape (e.g. a serialVersionUID
      # bump) makes the persisted session unreadable by the restarted classloader, which
      # logs as an ERROR on every such restart. Not worth it in dev - just re-login.
      persistent: false

game:
  dev:
    seed-accounts: true
    admin:
      username: admin
      email: admin@battleoftheuniverse.local
      password: admin123
    player:
      username: player
      email: player@battleoftheuniverse.local
      password: player123

logging:
  level:
    de.kugi.dev.battleoftheuniverse: DEBUG
