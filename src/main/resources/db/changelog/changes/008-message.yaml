databaseChangeLog:
  - changeSet:
      id: 008-create-messages-table
      author: kugi
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sender_user_id
                  type: BIGINT
              - column:
                  name: recipient_user_id
                  type: BIGINT
              - column:
                  name: subject
                  type: VARCHAR(120)
              - column:
                  name: body
                  type: VARCHAR(4000)
              - column:
                  name: type
                  type: VARCHAR(50)
              - column:
                  name: sent_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: read_at
                  type: TIMESTAMP WITH TIME ZONE
