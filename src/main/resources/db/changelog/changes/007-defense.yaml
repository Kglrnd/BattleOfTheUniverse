databaseChangeLog:
  - changeSet:
      id: 007-create-towers-table
      author: kugi
      changes:
        - createTable:
            tableName: towers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: planet_id
                  type: BIGINT
              - column:
                  name: tower_key
                  type: VARCHAR(255)
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
  - changeSet:
      id: 007-add-towers-unique-constraint
      author: kugi
      changes:
        - addUniqueConstraint:
            tableName: towers
            columnNames: planet_id, tower_key
            constraintName: uk_towers_planet_tower
  - changeSet:
      id: 007-create-defense-jobs-table
      author: kugi
      changes:
        - createTable:
            tableName: defense_jobs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: planet_id
                  type: BIGINT
              - column:
                  name: tower_key
                  type: VARCHAR(255)
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: ends_at
                  type: TIMESTAMP WITH TIME ZONE
