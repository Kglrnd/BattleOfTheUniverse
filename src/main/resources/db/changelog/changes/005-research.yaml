databaseChangeLog:
  - changeSet:
      id: 005-create-technologies-table
      author: kugi
      changes:
        - createTable:
            tableName: technologies
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
              - column:
                  name: technology_key
                  type: VARCHAR(255)
              - column:
                  name: level
                  type: INT
                  constraints:
                    nullable: false
  - changeSet:
      id: 005-add-technologies-unique-constraint
      author: kugi
      changes:
        - addUniqueConstraint:
            tableName: technologies
            columnNames: user_id, technology_key
            constraintName: uk_technologies_user_technology
  - changeSet:
      id: 005-create-research-jobs-table
      author: kugi
      changes:
        - createTable:
            tableName: research_jobs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
              - column:
                  name: planet_id
                  type: BIGINT
              - column:
                  name: technology_key
                  type: VARCHAR(255)
              - column:
                  name: target_level
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: ends_at
                  type: TIMESTAMP WITH TIME ZONE
