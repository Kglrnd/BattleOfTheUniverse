<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Battle of the Universe</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .space-title {
            color: #1e3c72;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .login-type-selector {
            margin-bottom: 30px;
        }

        .login-type-btn {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            color: #495057;
            padding: 12px 24px;
            margin: 0 5px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .login-type-btn.active {
            background: #1e3c72;
            color: white;
            border-color: #1e3c72;
        }

        .login-type-btn:hover {
            background: #2a5298;
            color: white;
            border-color: #2a5298;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #1e3c72;
            outline: none;
            box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
        }

        .login-btn {
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 60, 114, 0.3);
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .space-decoration {
            margin: 20px 0;
            color: #1e3c72;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="space-title">🚀 Battle of the Universe</h1>

        <div class="login-type-selector">
            <a href="/login/player" th:classappend="${!isAdmin} ? 'active' : ''" class="login-type-btn">
                👨‍🚀 Spieler Login
            </a>
            <a href="/login/admin" th:classappend="${isAdmin} ? 'active' : ''" class="login-type-btn">
                👑 Admin Login
            </a>
        </div>

        <div class="space-decoration">⭐ ✨ 🌟</div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div th:if="${logoutMessage}" class="alert alert-success" th:text="${logoutMessage}"></div>

        <form th:action="@{/authenticate}" method="post">
            <input type="hidden" name="loginType" th:value="${loginType}">

            <div class="form-group">
                <label for="username">Benutzername:</label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       required 
                       autofocus
                       th:placeholder="${isAdmin} ? 'Admin Benutzername' : 'Spieler Benutzername'">
            </div>

            <div class="form-group">
                <label for="password">Passwort:</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       required
                       th:placeholder="${isAdmin} ? 'Admin Passwort' : 'Spieler Passwort'">
            </div>

            <button type="submit" class="login-btn">
                <span th:if="${isAdmin}">🔐 Als Admin einloggen</span>
                <span th:unless="${isAdmin}">🚀 Ins Weltall starten</span>
            </button>
        </form>

        <div class="space-decoration">🌌 🛸 🌠</div>
    </div>
</body>
</html>
