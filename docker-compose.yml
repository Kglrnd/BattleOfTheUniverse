services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: battleoftheuniverse
      POSTGRES_USER: battleoftheuniverse
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battleoftheuniverse -d battleoftheuniverse"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/battleoftheuniverse
      DB_USERNAME: battleoftheuniverse
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - backend-config:/app/config
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  postgres-data:
  backend-config:
