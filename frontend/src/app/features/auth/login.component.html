<div class="auth-card">
  <h1>Log in</h1>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="login-username">Username</label>
      <input class="input" id="login-username" formControlName="username" autocomplete="username" />
    </div>

    <div class="field">
      <label for="login-password">Password</label>
      <input class="input" id="login-password" type="password" formControlName="password" autocomplete="current-password" />
    </div>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <button class="btn btn-primary" type="submit" [disabled]="form.invalid || submitting()">
      Log in
    </button>
  </form>

  <p class="switch">No account yet? <a routerLink="/register">Register</a></p>
</div>
