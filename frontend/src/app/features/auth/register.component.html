<div class="auth-card">
  <h1>Register</h1>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="register-username">Username</label>
      <input class="input" id="register-username" formControlName="username" autocomplete="username" />
    </div>

    <div class="field">
      <label for="register-email">Email</label>
      <input class="input" id="register-email" type="email" formControlName="email" autocomplete="email" />
    </div>

    <div class="field">
      <label for="register-password">Password</label>
      <input class="input" id="register-password" type="password" formControlName="password" autocomplete="new-password" />
    </div>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <button class="btn btn-primary" type="submit" [disabled]="form.invalid || submitting()">
      Create account
    </button>
  </form>

  <p class="switch">Already have an account? <a routerLink="/login">Log in</a></p>
</div>
