<div class="auth-card" *transloco="let t; prefix: 'auth.register'">
  <h1>{{ t('title') }}</h1>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="register-username">{{ t('username') }}</label>
      <input class="input" id="register-username" formControlName="username" autocomplete="username" />
    </div>

    <div class="field">
      <label for="register-email">{{ t('email') }}</label>
      <input class="input" id="register-email" type="email" formControlName="email" autocomplete="email" />
    </div>

    <div class="field">
      <label for="register-password">{{ t('password') }}</label>
      <input class="input" id="register-password" type="password" formControlName="password" autocomplete="new-password" />
    </div>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <button class="btn btn-primary" type="submit" [disabled]="form.invalid || submitting()">
      {{ t('submit') }}
    </button>
  </form>

  <p class="switch">{{ t('alreadyHaveAccount') }} <a routerLink="/login">{{ t('loginLink') }}</a></p>
</div>
