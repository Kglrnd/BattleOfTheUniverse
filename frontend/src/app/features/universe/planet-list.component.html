<h1>Your planets</h1>

@if (loading()) {
  <p>Loading…</p>
} @else if (planets().length === 0) {
  <p>No planets yet.</p>
} @else {
  <div class="card-grid">
    @for (planet of planets(); track planet.id) {
      <div class="card planet-card" [routerLink]="['/universe', planet.id]">
        <div class="card-header">
          <div class="card-title">{{ planet.name }}</div>
          <div class="card-subtitle">{{ planet.coordinates }}</div>
        </div>
        <div class="card-content">
          <span class="class-badge">{{ planet.planetClass }}</span>
        </div>
      </div>
    }
  </div>
}
