<ng-container *transloco="let t; prefix: 'universe.resourceBar'">
  @if (currentPlanet.selectedPlanet(); as planet) {
    <div class="resource-bar">
      <span class="planet-label">{{ planet.name }} · {{ planet.coordinates }}</span>
      @for (resource of resourcesResource.value() ?? []; track resource.resourceKey) {
        <div class="resource">
          <span class="label">{{ resource.displayName }}</span>
          <span class="amount">{{ resource.amount }}</span>
        </div>
      }
    </div>
  }
</ng-container>
