<header class="app-header">
  <a class="brand" routerLink="/universe">Battle of the Universe</a>
  <nav>
    @if (auth.isAuthenticated()) {
      <a routerLink="/universe" routerLinkActive="active">Universe</a>
      @if (auth.isAdmin()) {
        <a routerLink="/admin/catalog/buildings" routerLinkActive="active">Admin</a>
      }
      <span class="username">{{ auth.currentUser()?.username }}</span>
      <button type="button" (click)="logout()">Log out</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Log in</a>
      <a routerLink="/register" routerLinkActive="active">Register</a>
    }
  </nav>
</header>

<main>
  <router-outlet />
</main>
